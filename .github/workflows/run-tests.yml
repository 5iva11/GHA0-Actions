name: Run Playwright Tests (Python)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # schedule:                  # Uncomment to enable scheduled runs
  #   - cron: '0 6 * * *'     # Runs daily at 06:00 UTC — adjust as needed
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override BASE_URL for this run'
        required: false
        type: string
        default: ''
      browsers:
        description: 'Browsers to run: chromium firefox webkit'
        required: false
        type: string
        default: 'chromium firefox webkit'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Playwright Python - All Browsers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: |
          BROWSERS="${{ github.event.inputs.browsers || 'chromium firefox webkit' }}"
          BROWSER_FLAGS=""
          for b in $BROWSERS; do
            BROWSER_FLAGS="$BROWSER_FLAGS --browser $b"
          done
          # Pass --base-url to pytest-playwright if BASE_URL is provided
          BASE_URL_FLAG=""
          if [ -n "$BASE_URL" ]; then
            BASE_URL_FLAG="--base-url $BASE_URL"
          fi
          mkdir -p pytest-report test-results
          python -m pytest tests/ $BROWSER_FLAGS $BASE_URL_FLAG -v
        env:
          BASE_URL: ${{ github.event.inputs.base_url || '' }}
          CI: 'true'
        continue-on-error: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ github.run_id }}
          path: pytest-report/
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 30

  commit-reports:
    name: Commit reports to gh-pages
    needs: test
    if: always()
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts/

      - name: Checkout gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages-dir origin/gh-pages
          else
            git worktree add --orphan -b gh-pages gh-pages-dir
            touch gh-pages-dir/.nojekyll
          fi

      - name: Store run data in gh-pages
        env:
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_DIR="gh-pages-dir/runs/${RUN_ID}"
          mkdir -p "$RUN_DIR"

          RESULTS_SRC="downloaded-artifacts/test-results-${RUN_ID}/results.json"
          if [ -f "$RESULTS_SRC" ]; then
            cp "$RESULTS_SRC" "$RUN_DIR/results.json"
          else
            echo '{"summary":{"total":0,"passed":0,"failed":0,"skipped":0}}' > "$RUN_DIR/results.json"
          fi

          HTML_SRC="downloaded-artifacts/pytest-report-${RUN_ID}"
          if [ -d "$HTML_SRC" ]; then
            cp -r "$HTML_SRC" "$RUN_DIR/report"
          fi

          printf '{\n  "run_id": "%s",\n  "timestamp": "%s",\n  "branch": "%s",\n  "commit": "%s",\n  "actor": "%s",\n  "event": "%s"\n}\n' \
            "$RUN_ID" "$TIMESTAMP" "$BRANCH" "$COMMIT" "$ACTOR" "$EVENT" \
            > "$RUN_DIR/meta.json"

      - name: Cleanup old runs
        run: node scripts/cleanup-reports.js
        env:
          MAX_RUNS: '20'
          PAGES_DIR: gh-pages-dir

      - name: Commit run data
        run: |
          cd gh-pages-dir
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "ci: store run ${{ github.run_id }} [skip ci]"
            git push origin HEAD:gh-pages
          fi

      - name: Trigger publish-report workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              workflow_id: 'publish-report.yml',
              ref:         'main',
            });
