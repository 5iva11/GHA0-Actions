[pytest]
# Default test discovery path
testpaths = tests

# Default report output paths (can be overridden on the command line)
addopts =
    --html=pytest-report/report.html
    --self-contained-html
    --json-report
    --json-report-file=test-results/results.json

# Show extra test summary info for failures and errors
log_cli = true
log_cli_level = INFO
